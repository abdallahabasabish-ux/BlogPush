<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - NilePush</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <style>
        /* تنسيق خاص بصفحة تسجيل الدخول */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #CE1126 100%);
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            border-top: 8px solid #C9A84C;
            text-align: center;
        }
        .login-logo {
            font-size: 48px;
            color: #CE1126;
            margin-bottom: 10px;
        }
        .login-logo span {
            font-weight: 800;
            color: #000;
        }
        .login-logo i {
            color: #C9A84C;
        }
        .login-title {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        .login-subtitle {
            color: #888;
            font-weight: 400;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: right;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-control {
            border-radius: 16px;
            padding: 15px 20px;
            border: 2px solid #eee;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            font-size: 15px;
        }
        .form-control:focus {
            border-color: #C9A84C;
            outline: none;
            box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.2);
        }
        .btn-login {
            background: linear-gradient(135deg, #CE1126, #8B0000);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(206, 17, 38, 0.4);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .gold-divider {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, #C9A84C, transparent);
            margin: 20px 0;
        }
        .footer-note {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .footer-note i {
            color: #C9A84C;
        }
        .message-box {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
            font-size: 14px;
        }
        .message-box.error {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            display: block;
        }
        .message-box.success {
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            color: #276749;
            display: block;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-bell"></i> <span>Nile</span>Push
        </div>
        <div class="login-title">مرحباً بعودتك</div>
        <div class="login-subtitle">منصة الإشعارات الفورية للمدونين المصريين</div>

        <div id="messageBox" class="message-box"></div>

        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope" style="color:#C9A84C;"></i> البريد الإلكتروني</label>
                <input type="email" id="emailInput" class="form-control" placeholder="example@email.com" required dir="ltr">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user" style="color:#C9A84C;"></i> الاسم (اختياري)</label>
                <input type="text" id="nameInput" class="form-control" placeholder="اسمك الكامل">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-key"></i> دخول
            </button>
        </form>

        <hr class="gold-divider">

        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> سيتم إنشاء حسابك تلقائياً عند أول تسجيل دخول
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // التحقق من الجلسة – إذا كان مسجلاً، يُوجّه إلى لوحة التحكم
        if (window.app && window.app.isLoggedIn()) {
            window.location.href = 'index.html';
            return;
        }

        const form = document.getElementById('loginForm');
        const email = document.getElementById('emailInput');
        const name = document.getElementById('nameInput');
        const btn = document.getElementById('loginBtn');
        const msgBox = document.getElementById('messageBox');

        function showMessage(text, type) {
            msgBox.textContent = text;
            msgBox.className = 'message-box ' + type;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
            msgBox.className = 'message-box';
            msgBox.style.display = 'none';

            const emailVal = email.value.trim();
            const nameVal = name.value.trim();

            if (!emailVal) {
                showMessage('الرجاء إدخال البريد الإلكتروني', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key"></i> دخول';
                return;
            }

            if (!window.app.isValidEmail(emailVal)) {
                showMessage('يرجى إدخال بريد إلكتروني صحيح', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key"></i> دخول';
                return;
            }

            try {
                const user = await window.app.login(emailVal, nameVal);
                showMessage('مرحباً ' + (user.displayName || user.email) + '! جاري التوجيه...', 'success');
                btn.innerHTML = '<i class="fas fa-check"></i> تم';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (err) {
                showMessage(err.message || 'حدث خطأ، حاول مرة أخرى', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key"></i> دخول';
            }
        });
    });
</script>

</body>
</html>
